spring.application.name=movierecommendation

# Docker packaged/JAR profile.
spring.datasource.url=${LOCAL_DB_URL:jdbc:postgresql://db:5432/movierecommendation}
spring.datasource.username=${LOCAL_DB_USERNAME:postgres}
spring.datasource.password=${LOCAL_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.open-in-view=true
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.physical_naming_strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.properties.hibernate.implicit_naming_strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# Server
server.address=${SERVER_ADDRESS:0.0.0.0}
server.port=${LOCAL_SERVER_PORT:8080}

# Thymeleaf
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=60000
spring.datasource.hikari.initialization-fail-timeout=-1
spring.datasource.hikari.idle-timeout=60000
spring.datasource.hikari.max-lifetime=580000
spring.datasource.hikari.keepalive-time=30000
spring.datasource.hikari.validation-timeout=5000

# API Keys
openai.api.key=${OPENAI_API_KEY:}
tmdb.api.key=${TMDB_API_KEY:}
app.remember-me-key=${APP_REMEMBER_ME_KEY:localMovieRecRememberMeKeyChangeThis32Chars}

# Logging
logging.level.com.example.movierecommendation=INFO

# Mail Configuration (Brevo SMTP)
brevo.api.key=${BREVO_API_KEY:}
app.mail.from=${APP_MAIL_FROM:noreply@movierec.local}
app.verification.code-expiration-minutes=10
app.verification.code-length=6

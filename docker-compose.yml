services:
  db:
    image: postgres:18-alpine
    container_name: movierec-db
    environment:
      POSTGRES_DB: movierecommendation
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - movierec-postgres-data:/var/lib/postgresql
      - ./database-local.sql:/docker-entrypoint-initdb.d/01-database-local.sql:ro
      - ./docker/postgres/99-init-complete.sql:/docker-entrypoint-initdb.d/99-init-complete.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d movierecommendation && psql -U postgres -d movierecommendation -tAc \"select to_regclass('public.local_init_complete') is not null\" | grep -q t"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: movierec-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/movierecommendation
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.postgresql.Driver
      SPRING_JPA_OPEN_IN_VIEW: "true"
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      SPRING_JPA_SHOW_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_DIALECT: org.hibernate.dialect.PostgreSQLDialect
      SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL: "false"
      SPRING_JPA_PROPERTIES_HIBERNATE_PHYSICAL_NAMING_STRATEGY: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
      SPRING_JPA_PROPERTIES_HIBERNATE_IMPLICIT_NAMING_STRATEGY: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
      SPRING_THYMELEAF_CACHE: "false"
      SPRING_THYMELEAF_ENCODING: UTF-8
      SPRING_SERVLET_MULTIPART_MAX_FILE_SIZE: 10MB
      SPRING_SERVLET_MULTIPART_MAX_REQUEST_SIZE: 10MB
      LOCAL_DB_URL: jdbc:postgresql://db:5432/movierecommendation
      LOCAL_DB_USERNAME: postgres
      LOCAL_DB_PASSWORD: postgres
      LOCAL_SERVER_PORT: 8080
      SERVER_ADDRESS: 0.0.0.0
      APP_REMEMBER_ME_KEY: localMovieRecRememberMeKeyChangeThis32Chars
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      BREVO_API_KEY: ${BREVO_API_KEY:-}
      APP_MAIL_FROM: ${APP_MAIL_FROM:-noreply@movierec.local}
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  movierec-postgres-data:
